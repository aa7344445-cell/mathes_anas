<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplication Fun!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1 class="bounce-in">Multiplication Fun!</h1>
            <img src="assets/monster.png" alt="Cute Monster" class="mascot floating">
            <h2>Choose Your Level:</h2>
            <div class="level-buttons">
                <button class="btn btn-easy" onclick="startGame('easy')">Easy</button>
                <button class="btn btn-medium" onclick="startGame('medium')">Medium</button>
                <button class="btn btn-hard" onclick="startGame('hard')">Hard</button>
            </div>
            <footer>Designed and Created by Anas the Programmer</footer>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="header">
                <div class="stars">⭐ <span id="score">0</span></div>
                <div class="timer">⏳ <span id="time-left">60</span>s</div>
            </div>
            
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>

            <div class="question-container">
                <h2 id="question" class="pop-in">3 x 4 = ?</h2>
            </div>

            <div id="options" class="options-grid">
                <!-- Buttons will be injected by JS -->
            </div>

            <div class="feedback-area">
                <img src="assets/monster.png" alt="Cute Monster" id="feedback-monster" class="mascot-small">
                <p id="feedback-text"></p>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="screen">
            <h1 class="bounce-in">Time's Up!</h1>
            <img src="assets/monster.png" alt="Cute Monster" class="mascot floating">
            <h2>You collected:</h2>
            <div class="final-score">⭐ <span id="final-score-value">0</span> Stars!</div>
            <p id="end-message">Great job! You are a math star!</p>
            <button class="btn btn-easy pulse" onclick="showStartScreen()">Play Again</button>
            <footer>Designed and Created by Anas the Programmer</footer>
        </div>
    </div>
    
    <!-- Canvas for Confetti -->
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
